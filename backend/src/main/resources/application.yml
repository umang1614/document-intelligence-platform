server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/docplatform?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

jwt:
  secret: your-secret-key-change-this-in-production-minimum-256-bits
  expiration: 86400000
